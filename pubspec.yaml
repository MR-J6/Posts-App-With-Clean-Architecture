name: posts_app
description: "Posts App with clean architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  
  # Service Locator
  get_it: ^9.2.1
  #Functional Programming
  dartz: ^0.10.1

  #Value Equality
  equatable: ^2.0.7

  # Remote API
  http: ^1.6.0
  internet_connection_checker: ^3.0.1

  # Local Data Source
  shared_preferences: ^2.5.5
  
  # Bloc for state management
  flutter_bloc: ^8.1.3
  
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true
